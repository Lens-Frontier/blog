name: PR Preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-preview-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number
    runs-on: ubuntu-latest
    steps:
      - name: Download CI preview artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read preview metadata
        id: meta
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const meta = JSON.parse(fs.readFileSync('dist/preview-meta.json', 'utf8'));
          for (const [key, value] of Object.entries(meta)) {
            console.log(`${key}=${value}`);
          }
          NODE

      - name: Deploy preview site
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: ${{ steps.meta.outputs.destination_dir }}
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: Comment preview link
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          PREVIEW_URL: ${{ steps.meta.outputs.preview_url }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = '<!-- lens-frontier-pr-preview -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;
            const body = `${marker}
            ✅ CI passed and preview was deployed for \`${process.env.SHORT_SHA}\`.

            Preview:
            ${process.env.PREVIEW_URL}

            This URL includes the PR number and commit hash, so each pushed revision has a distinct preview snapshot.

            Workflow run: ${runUrl}`;

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
