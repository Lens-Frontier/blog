name: PR Preview Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Remove preview directory
        working-directory: gh-pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          target="pr-preview/pr-${PR_NUMBER}"
          if [ ! -d "$target" ]; then
            echo "No preview directory to remove."
            exit 0
          fi

          rm -rf "$target"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "$target"
          git commit -m "Remove preview for PR #${PR_NUMBER}" || exit 0
          git push

      - name: Update preview comment
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = '<!-- lens-frontier-pr-preview -->';
            const body = `${marker}
            🧹 Preview snapshots for PR #${prNumber} have been removed because the PR was closed.`;

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            }
