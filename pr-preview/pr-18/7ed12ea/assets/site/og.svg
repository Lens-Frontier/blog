<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Lens Frontier</title>
	<desc id="desc">A quiet editorial share card for paper reading, benchmark notes, and opinions.</desc>
	<defs>
