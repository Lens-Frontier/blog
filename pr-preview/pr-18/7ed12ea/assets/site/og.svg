		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#171612" flood-opacity=".12"/>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="#f6f2e8"/>
